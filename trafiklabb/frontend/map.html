<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fordonsposition</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { height: 100vh; }
    #status {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #16213e;
      color: #eee;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      border: 1px solid #0f3460;
      z-index: 1000;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    #status.error { border-color: #e94560; color: #e94560; }
  </style>
</head>
<body>
  <div id="status">Hämtar position...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG?.apiBase;
    const journeyId = new URLSearchParams(location.search).get('journeyId');
    const statusEl = document.getElementById('status');

    if (!API_BASE || !journeyId) {
      statusEl.textContent = 'Ogiltig länk';
      statusEl.classList.add('error');
      throw new Error('Missing config or journeyId');
    }

    // Initialize Leaflet map centered on Stockholm
    const map = L.map('map').setView([59.3293, 18.0686], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    let marker = null;
    let hasZoomed = false;

    async function fetchPosition() {
      try {
        const res = await fetch(
          `${API_BASE}/api/vehicle?journeyId=${encodeURIComponent(journeyId)}`
        );
        const data = await res.json();

        if (!data.found) {
          statusEl.textContent = 'Fordonet hittades inte i realtidsdata';
          statusEl.classList.add('error');
          return;
        }

        statusEl.textContent = 'Uppdateras var 10:e sekund';
        statusEl.classList.remove('error');

        const { lat, lon } = data;

        if (!marker) {
          marker = L.circleMarker([lat, lon], {
            radius: 10,
            fillColor: '#e94560',
            color: '#fff',
            weight: 2,
            fillOpacity: 0.9,
          }).addTo(map);
        } else {
          marker.setLatLng([lat, lon]);
        }

        if (!hasZoomed) {
          map.setView([lat, lon], 15);
          hasZoomed = true;
        }
      } catch {
        statusEl.textContent = 'Fel vid hämtning av position';
        statusEl.classList.add('error');
      }
    }

    fetchPosition();
    setInterval(fetchPosition, 10000);
  </script>
</body>
</html>
