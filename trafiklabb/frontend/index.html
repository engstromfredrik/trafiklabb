<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avgångstavla - Stockholm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      padding: 1.5rem;
      text-align: center;
      border-bottom: 3px solid #0f3460;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p { color: #999; font-size: 0.85rem; margin-top: 0.3rem; }

    .container { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* Search */
    .search-box {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      outline: none;
    }

    .search-box input:focus { border-color: #e94560; }
    .search-box input::placeholder { color: #666; }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 0 0 8px 8px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .suggestions.visible { display: block; }

    .suggestions button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.7rem 1rem;
      background: none;
      border: none;
      color: #eee;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .suggestions button:hover { background: #0f3460; }

    /* Selected stop */
    .selected-stop {
      background: #0f3460;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      justify-content: space-between;
    }

    .selected-stop.visible { display: flex; }
    .selected-stop span { font-weight: 600; }

    .selected-stop button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    /* Departures */
    .status { text-align: center; color: #999; padding: 2rem 0; }

    .departure-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .departure {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      background: #16213e;
      border-radius: 6px;
      border-left: 4px solid #333;
      cursor: pointer;
      transition: background 0.15s;
    }

    .departure:hover { background: #1e2d50; }

    .departure[data-mode="BUS"]   { border-left-color: #e94560; }
    .departure[data-mode="METRO"] { border-left-color: #4ecca3; }
    .departure[data-mode="TRAIN"] { border-left-color: #f9a826; }
    .departure[data-mode="TRAM"]  { border-left-color: #a855f7; }
    .departure[data-mode="SHIP"]  { border-left-color: #38bdf8; }

    .departure .line {
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
    }

    .departure .dest { font-size: 0.95rem; }

    .departure .time {
      text-align: right;
      white-space: nowrap;
    }

    .departure .time .mins {
      display: block;
      font-weight: 700;
      font-size: 1.1rem;
      color: #eee;
    }

    .departure .time .clock {
      display: block;
      font-size: 0.8rem;
      color: #4ecca3;
      font-weight: 400;
    }

    .departure .deviations {
      grid-column: 1 / -1;
      font-size: 0.8rem;
      color: #e94560;
    }

    .auto-refresh {
      text-align: center;
      color: #666;
      font-size: 0.8rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Avgångstavla</h1>
    <p>Realtidsavgångar som visas vid busskur eller perrong.
    </p>
  </header>

  <div class="container">
    <div class="search-box">
      <input type="text" id="search" placeholder="Sök hållplats, t.ex. Slussen eller T-Centralen..." autocomplete="off">
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div class="selected-stop" id="selected-stop">
      <span id="stop-name"></span>
      <button onclick="clearStop()">Rensa</button>
    </div>

    <div id="departures"></div>
  </div>

  <script>
    // ---- CONFIGURATION ----
    const API_BASE = window.APP_CONFIG?.apiBase;

    if (!API_BASE) {
      document.getElementById('departures').innerHTML =
        '<div class="status">Configuration missing — deploy via infra/deploy.sh to inject API URL.</div>';
      throw new Error('API_BASE not configured');
    }

    // ---- STATE ----
    let selectedSiteId = null;
    let selectedDestFilter = null;
    let refreshTimer = null;
    let searchTimer = null;

    // ---- API CALLS ----
    async function fetchSites(query) {
      const res = await fetch(`${API_BASE}/api/sites?q=${encodeURIComponent(query)}`);
      return res.json();
    }

    async function fetchDepartures(siteId, destination) {
      let url = `${API_BASE}/api/sites/${siteId}/departures`;
      if (destination) url += `?destination=${encodeURIComponent(destination)}`;
      const res = await fetch(url);
      const data = await res.json();
      return data.departures || [];
    }

    // ---- SEARCH ----
    const searchInput = document.getElementById('search');
    const suggestionsEl = document.getElementById('suggestions');

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length < 2) {
        suggestionsEl.classList.remove('visible');
        return;
      }
      searchTimer = setTimeout(() => doSearch(q), 230);
    });

    async function doSearch(query) {
      try {
        const sites = await fetchSites(query);
        if (!sites.length) {
          suggestionsEl.innerHTML = '<button disabled>Inga resultat</button>';
        } else {
          suggestionsEl.innerHTML = sites.map(s =>
            `<button data-id="${s.id}" data-name="${s.name}">${s.name}</button>`
          ).join('');
        }
        suggestionsEl.classList.add('visible');
      } catch {
        suggestionsEl.innerHTML = '<button disabled>Fel vid sökning</button>';
        suggestionsEl.classList.add('visible');
      }
    }

    // Select stop on suggestion click
    suggestionsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-id]');
      if (btn) selectStop(btn.dataset.id, btn.dataset.name);
    });

    // Hide suggestions on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box')) {
        suggestionsEl.classList.remove('visible');
      }
    });

    // ---- DEFAULT STOP ----
    const DEFAULT_SITE_ID = 7542;
    const DEFAULT_SITE_NAME = 'Kolarängen (Nacka)';

    async function loadDefault() {
      try {
        const sites = await fetchSites('Kolarängen');
        const site = sites.find(s => s.name.toLowerCase().includes('kolarängen'))
          || { id: DEFAULT_SITE_ID, name: DEFAULT_SITE_NAME };
        selectStop(site.id, site.name, 'Slussen');
      } catch {
        selectStop(DEFAULT_SITE_ID, DEFAULT_SITE_NAME, 'Slussen');
      }
    }

    loadDefault();

    // ---- SELECT / CLEAR STOP ----
    function selectStop(id, name, destination) {
      selectedSiteId = id;
      selectedDestFilter = destination || null;
      suggestionsEl.classList.remove('visible');
      searchInput.value = '';
      const label = destination ? `${name} → ${destination}` : name;
      document.getElementById('stop-name').textContent = label;
      document.getElementById('selected-stop').classList.add('visible');
      loadDepartures();
      // Auto-refresh every 30s
      clearInterval(refreshTimer);
      refreshTimer = setInterval(loadDepartures, 30000);
    }

    function clearStop() {
      selectedSiteId = null;
      selectedDestFilter = null;
      clearInterval(refreshTimer);
      document.getElementById('selected-stop').classList.remove('visible');
      document.getElementById('departures').innerHTML = '';
    }

    // ---- HELPERS ----
    function minutesLeft(expected) {
      if (!expected) return null;
      const diff = Math.round((new Date(expected) - new Date()) / 60000);
      if (diff < 0) return null;
      if (diff === 0) return 'Nu';
      return `${diff} min`;
    }

    function clockTime(expected) {
      if (!expected) return null;
      const d = new Date(expected);
      if (isNaN(d)) return null;
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    // ---- MAP ----
    function openMap(journeyId) {
      window.open(
        `/map.html?journeyId=${encodeURIComponent(journeyId)}`,
        '_blank',
        'noopener'
      );
    }

    // ---- RENDER DEPARTURES ----
    async function loadDepartures() {
      const container = document.getElementById('departures');
      if (!selectedSiteId) return;

      container.innerHTML = '<div class="status">Laddar avgångar...</div>';

      try {
        const departures = await fetchDepartures(selectedSiteId, selectedDestFilter);
        if (!departures.length) {
          container.innerHTML = '<div class="status">Inga avgångar just nu</div>';
          return;
        }

        container.innerHTML = `
          <div class="departure-list">
            ${departures.map(d => `
              <div class="departure" data-mode="${d.transportMode}"
                   ${d.journeyId ? `onclick="openMap('${d.journeyId}')"` : ''}>
                <div class="line">${d.line}</div>
                <div class="dest">${d.destination}</div>
                <div class="time">
                  <span class="mins">${minutesLeft(d.expected) || d.displayTime}</span>
                  <span class="clock">${clockTime(d.expected) || ''}</span>
                </div>
                ${d.deviations?.length ? `<div class="deviations">${d.deviations.join(', ')}</div>` : ''}
              </div>
            `).join('')}
          </div>
          <div class="auto-refresh">Uppdateras automatiskt var 30:e sekund</div>
        `;
      } catch {
        container.innerHTML = '<div class="status">Kunde inte hämta avgångar</div>';
      }
    }
  </script>
</body>
</html>
