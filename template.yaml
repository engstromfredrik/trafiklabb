AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Stockholm Departure Board - Trafiklab SL Transport API

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 128
  Api:
    Cors:
      AllowMethods: "'GET,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:
  DepartureBoardApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod

  SitesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: index.searchSites
      Events:
        SearchSites:
          Type: Api
          Properties:
            RestApiId: !Ref DepartureBoardApi
            Path: /api/sites
            Method: get

  DeparturesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: index.getDepartures
      Events:
        GetDepartures:
          Type: Api
          Properties:
            RestApiId: !Ref DepartureBoardApi
            Path: /api/sites/{siteId}/departures
            Method: get

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${DepartureBoardApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  FrontendUrl:
    Description: S3 website URL
    Value: !GetAtt FrontendBucket.WebsiteURL
  FrontendBucket:
    Description: S3 bucket for frontend deployment
    Value: !Ref FrontendBucket
